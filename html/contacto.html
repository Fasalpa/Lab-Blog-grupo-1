<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/styles.css" />
    <title>Contacto</title>
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="../index.html">Inicio</a></li>
        <li><a href="quienes-somos.html">Quiénes somos</a></li>
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
    </nav>
    <main>
      <section>
        <h2>Canales de comunicacion</h2>
        <p>
          Si quieres formar parte de nuestra comunidad puedes contactarnos por
          medio de los siguientes medios
        </p>
        <div class="infoContacto">
          <div class="tarjeta">
            <h3>Email</h3>
            <p>taronytinto@hotmail.com</p>
          </div>
        </div>
        <h2>Envianos un mensaje</h2>

        <form id="miFormulario" class="form-wrap">
          <label for="nombre">Nombre completo:</label>
          <input
            type="text"
            id="nombre"
            name="nombre"
            placeholder="escribe tu nombre"
            required
          />

          <label for="correo">Tu correo electrónico:</label>
          <input
            type="email"
            id="correo"
            name="correo"
            placeholder="usuario@correo.com"
            required
          />

          <label for="mensaje">¿Por qué quieres unirte?:</label>
          <textarea
            id="mensaje"
            name="mensaje"
            rows="4"
            placeholder="Cuéntanos un poco sobre ti"
          ></textarea>

          <button id="btn-enviar">Enviar Solicitud</button>

          <p id="formularioEnviado"></p>
        </form>
      </section>
    </main>
    <script src="../js/app.js"></script>
  </body>
</html>
